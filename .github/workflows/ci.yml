name: CI

# Runs on PRs to main AND direct pushes to main (e.g. hotfixes)
on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # ── Job 2: Test ─────────────────────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  # ── Job 3: Build ─────────────────────────────────────────────────────────────
  build:
    name: Build check
    runs-on: ubuntu-latest
    needs: [lint, test]
    env:
      # Vite requires VITE_* vars at build time; fall back to a placeholder
      # when the secret is not set (e.g. PRs from forks).
      VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'https://placeholder.example.com' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build